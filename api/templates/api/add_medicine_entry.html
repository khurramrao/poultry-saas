<!DOCTYPE html>
<html>
<head>
    <title>Add Medicine Entry</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            margin:0;
            padding:30px;
        }

        .container{
            max-width:700px;
            margin:auto;
        }

        .card{
            background:white;
            border-radius:16px;
            padding:30px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .title{
            text-align:center;
            color:#1f4e79;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
            color:#344054;
        }

        select,
        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #d0d5dd;
            border-radius:10px;
            font-size:15px;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
        }

        .btn-row{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        .btn{
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
            border:none;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
        }

        .btn-back{
            background:#667085;
            color:white;
        }

        .btn-save{
            background:#dc2626;
            color:white;
        }

        .btn-save:hover{
              background:#b91c1c;
        }

        .header-icon{
            font-size:48px;
            text-align:center;
            margin-bottom:10px;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <div class="header-icon">💊</div>

        <h2 class="title">Add Medicine Entry</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Batch</label>
                <select name="batch_id" required>
                    <option value="">Select Batch</option>

                    {% for batch in batches %}
                        <option value="{{ batch.id }}">
                            Batch #{{ batch.batch_number }}
                            ({{ batch.shed.shed_type|title }})
                            - {{ batch.current_birds }} Birds Available
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Entry Date</label>
                <input type="date" name="entry_date" required>
            </div>

            <div class="form-group">
                <label for="medicine_name">Medicine Name</label>
                <input
                    type="text"
                    id="medicine_name"
                    name="medicine_name"
                    placeholder="Example: Enrofloxacin, Lasota Vaccine, AD3E"
                    required
                >
            </div>

            <div class="form-group">
                <label for="medicine_type">Type</label>
                <select id="medicine_type" name="medicine_type" required>
                    <option value="medicine">Medicine</option>
                    <option value="vaccine">Vaccine</option>
                    <option value="multivitamin">Multivitamin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Medicine Cost (Rs)</label>
                <input type="number"
                       step="0.01"
                       name="amount"
                       placeholder="Enter feed cost"
                       required>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes"
                          rows="4"
                          placeholder="Optional notes..."></textarea>
            </div>

            <div class="btn-row">
                <a href="{% url 'finance_tracker' %}"
                   class="btn btn-back">
                    ← Back
                </a>

                <button type="submit"
                        class="btn btn-save">
                    Save Medicine Entry
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
