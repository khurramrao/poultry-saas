<!DOCTYPE html>
<html>
<head>
    <title>Record Sale</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            margin:0;
            padding:30px;
        }

        .container{
            max-width:700px;
            margin:auto;
        }

        .card{
            background:white;
            border-radius:16px;
            padding:30px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .icon{
            text-align:center;
            font-size:48px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#1f4e79;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            font-weight:bold;
            color:#344054;
            margin-bottom:6px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #d0d5dd;
            border-radius:10px;
            font-size:15px;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
        }

        .btn-row{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        .btn{
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
            border:none;
            cursor:pointer;
            font-weight:bold;
            font-size:15px;
        }

        .btn-back{
            background:#667085;
            color:white;
        }

        .btn-save{
            background:#16a34a;
            color:white;
        }

        .btn-save:hover{
            background:#15803d;
        }

        @media(max-width:768px){
            .btn-row{
                flex-direction:column;
            }

            .btn{
                width:100%;
                text-align:center;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="icon">💰</div>

        <h2>Record Sale</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Batch</label>

                <select name="batch_id" required>
                    <option value="">Select Batch</option>

                    {% for batch in batches %}
                        <option value="{{ batch.id }}">
                            Batch #{{ batch.batch_number }}
                            ({{ batch.shed.shed_type|title }})
                            - {{ batch.current_birds }} Birds Available
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Sale Date</label>
                <input type="date" name="sale_date" required>
            </div>

            <div class="form-group">
                <label>Birds Sold</label>
                <input type="number"
                       name="birds_sold"
                       min="1"
                       placeholder="Enter birds sold"
                       required>
            </div>

            <div class="form-group">
                <label>Total Weight (KG)</label>
                <input type="number"
                       step="0.01"
                       name="total_weight_kg"
                       placeholder="Enter total weight"
                       required>
            </div>

            <div class="form-group">
                <label>Rate Per KG (Rs)</label>
                <input type="number"
                       step="0.01"
                       name="rate_per_kg"
                       placeholder="Enter rate per kg"
                       required>
            </div>

            <div class="form-group">
                <label>Discount (Rs)</label>
                <input type="number"
                       step="0.01"
                       name="discount_amount"
                       value="0">
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes"
                          rows="4"
                          placeholder="Optional notes..."></textarea>
            </div>

            <div class="btn-row">

                <a href="{% url 'finance_tracker' %}"
                   class="btn btn-back">
                    ← Back
                </a>

                <button type="submit"
                        class="btn btn-save">
                    Save Sale
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
